<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #canvas-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        .celestial-body {
            position: absolute;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            user-select: none;
            pointer-events: none;
        }
        #star {
            width: 100px;
            height: 100px;
            background-image: url('star.png');
            background-size: cover;
            z-index: 10;
            box-shadow: 0 0 50px #ffcc00;
        }
        .orbit {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .planet {
            background-size: cover;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="star" class="celestial-body"></div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const star = document.getElementById('star');

        const planetsData = [
            { name: 'planet1', size: 30, distance: 100, speed: 0.02, img: 'planet1.png' },
            { name: 'planet2', size: 45, distance: 160, speed: 0.015, img: 'planet2.png' },
            { name: 'planet3', size: 25, distance: 230, speed: 0.01, img: 'planet3.png' },
            { name: 'planet4', size: 60, distance: 320, speed: 0.007, img: 'planet4.png' }
        ];

        const planets = [];

        planetsData.forEach(data => {
            // Create orbit line
            const orbit = document.createElement('div');
            orbit.className = 'orbit';
            orbit.style.width = (data.distance * 2) + 'px';
            orbit.style.height = (data.distance * 2) + 'px';
            orbit.style.left = '50%';
            orbit.style.top = '50%';
            container.appendChild(orbit);

            // Create planet
            const planet = document.createElement('div');
            planet.className = 'celestial-body planet';
            planet.style.width = data.size + 'px';
            planet.style.height = data.size + 'px';
            planet.style.backgroundImage = `url('${data.img}')`;
            planet.style.backgroundSize = 'cover';
            container.appendChild(planet);

            planets.push({
                element: planet,
                distance: data.distance,
                speed: data.speed,
                angle: Math.random() * Math.PI * 2
            });
        });

        function animate() {
            const centerX = container.clientWidth / 2;
            const centerY = container.clientHeight / 2;
            
            star.style.left = centerX + 'px';
            star.style.top = centerY + 'px';

            planets.forEach(p => {
                p.angle += p.speed;
                const x = centerX + p.distance * Math.cos(p.angle);
                const y = centerY + p.distance * Math.sin(p.angle);
                
                p.element.style.left = x + 'px';
                p.element.style.top = y + 'px';
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            // Re-center on resize if needed, though animation loop handles it
        });

        animate();
    </script>
</body>
</html>
